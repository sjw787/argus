name: Deploy Argus for Athena

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'prod'
        type: choice
        options: [prod, dev]
      skip_builds:
        description: 'Skip frontend + Docker builds (use existing ECR :latest)'
        required: false
        default: false
        type: boolean

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  # Opt into Node.js 24 for all JavaScript actions ahead of the June 2026 forced migration
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    if: ${{ !inputs.skip_builds }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e .
      - name: Run tests
        run: PYTHONPATH=src python -m pytest tests/ -q --cov=argus --cov-report=xml --cov-report=term-missing
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  test-frontend:
    if: ${{ !inputs.skip_builds }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Run unit tests
        run: cd frontend && npm test

  e2e:
    if: ${{ !inputs.skip_builds }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: cd frontend && npm run e2e
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  build-frontend:
    if: ${{ !inputs.skip_builds }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        run: cd frontend && npm ci && npm run build -- --outDir dist
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/

  build-and-push-docker:
    if: ${{ !inputs.skip_builds }}
    needs: [lint-and-test, test-frontend, e2e]
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.push.outputs.image_uri }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push
        id: push
        env:
          IMAGE_TAG: ${{ github.sha }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'prod' }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          ECR_REPO="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/argus-for-athena-${ENVIRONMENT}"
          # Ensure ECR repo exists (Terraform may not have run yet on first deploy)
          aws ecr create-repository \
            --repository-name "argus-for-athena-${ENVIRONMENT}" \
            --region "${AWS_REGION}" \
            --image-scanning-configuration scanOnPush=true \
            2>/dev/null || true
          docker build -f deploy/Dockerfile.backend -t "${ECR_REPO}:${IMAGE_TAG}" -t "${ECR_REPO}:latest" .
          docker push "${ECR_REPO}:${IMAGE_TAG}"
          docker push "${ECR_REPO}:latest"
          echo "image_uri=${ECR_REPO}:${IMAGE_TAG}" >> $GITHUB_OUTPUT

  terraform-and-deploy:
    needs:
      - build-and-push-docker
      - build-frontend
    if: ${{ always() && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.7'
      - name: Download frontend artifact
        if: ${{ !inputs.skip_builds }}
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist/
      - name: Terraform apply
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'prod' }}
          IMAGE_URI: ${{ needs.build-and-push-docker.outputs.image_uri }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_create_hosted_zone: "true"
          TF_VAR_output_location: ${{ secrets.ATHENA_OUTPUT_LOCATION }}
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_sso_start_url: ${{ secrets.SSO_START_URL }}
          TF_VAR_manage_sso: "true"
        run: |
          # When skipping builds, resolve image URI from ECR :latest
          if [ -z "${IMAGE_URI}" ]; then
            IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/argus-for-athena-${ENVIRONMENT}:latest"
            echo "Using existing image: ${IMAGE_URI}"
          fi
          cd infra
          terraform init
          # Helper: check whether a resource address is present in TF state.
          # Captures the full state list to a variable before grepping so that
          # grep -q never closes the read-end of a pipe while Terraform is still
          # writing, causing a broken-pipe (EPIPE) in the setup-terraform wrapper.
          tf_in_state() {
            local _out
            _out=$(terraform state list 2>/dev/null) || true
            echo "$_out" | grep -q "$1"
          }
          # Import pre-existing ECR repo only if not already in state
          if ! tf_in_state 'aws_ecr_repository.app'; then
            echo "ECR repo not in state, importing..."
            terraform import \
              -var="environment=${ENVIRONMENT}" \
              -var="image_uri=${IMAGE_URI}" \
              aws_ecr_repository.app "argus-for-athena-${ENVIRONMENT}" || true
          else
            echo "ECR repo already in state, skipping import"
          fi
          # Remove corrupted ECR repo policy from state so TF can recreate it cleanly
          if tf_in_state 'aws_ecr_repository_policy.app'; then
            echo "Removing ECR repo policy from state for clean recreation..."
            terraform state rm aws_ecr_repository_policy.app || true
          fi
          # Import orphan CloudFront distribution if one exists with our CNAME and isn't in state
          if ! tf_in_state 'aws_cloudfront_distribution.app'; then
            ORPHAN_CF=$(aws cloudfront list-distributions \
              --query "DistributionList.Items[?Aliases.Items[?contains(@,'argus.samwylock.com')]].Id" \
              --output text 2>/dev/null || true)
            if [ -n "$ORPHAN_CF" ]; then
              echo "Importing orphan CloudFront distribution: $ORPHAN_CF"
              terraform import \
                -var="environment=${ENVIRONMENT}" \
                -var="image_uri=${IMAGE_URI}" \
                aws_cloudfront_distribution.app "$ORPHAN_CF" || true
            fi
          fi
          # Import orphan Route53 records if they exist but aren't in state
          HZ_ID=$(aws route53 list-hosted-zones-by-name --dns-name "argus.samwylock.com" \
            --query "HostedZones[?Name=='argus.samwylock.com.'].Id" --output text | sed 's|/hostedzone/||' || true)
          if [ -n "$HZ_ID" ]; then
            if ! tf_in_state 'aws_route53_record.app_a'; then
              echo "Importing Route53 A record..."
              terraform import \
                -var="environment=${ENVIRONMENT}" \
                -var="image_uri=${IMAGE_URI}" \
                aws_route53_record.app_a "${HZ_ID}_argus.samwylock.com_A" || true
            fi
            if ! tf_in_state 'aws_route53_record.app_aaaa'; then
              echo "Importing Route53 AAAA record..."
              terraform import \
                -var="environment=${ENVIRONMENT}" \
                -var="image_uri=${IMAGE_URI}" \
                aws_route53_record.app_aaaa "${HZ_ID}_argus.samwylock.com_AAAA" || true
            fi
          fi
          # Import primary Athena workgroup (always exists; we manage its OutputLocation)
          if ! tf_in_state 'aws_athena_workgroup.primary'; then
            echo "Importing primary Athena workgroup..."
            terraform import \
              -var="environment=${ENVIRONMENT}" \
              -var="image_uri=${IMAGE_URI}" \
              aws_athena_workgroup.primary "primary" || true
          fi
          # Import orphan SSO resources if they exist but aren't in state
          if [ "${TF_VAR_manage_sso}" = "true" ]; then
            SSO_INSTANCE_ARN=$(aws sso-admin list-instances --region "${AWS_REGION}" --query 'Instances[0].InstanceArn' --output text 2>/dev/null || true)
            IDENTITY_STORE_ID=$(aws sso-admin list-instances --region "${AWS_REGION}" --query 'Instances[0].IdentityStoreId' --output text 2>/dev/null || true)
            if [ -n "$SSO_INSTANCE_ARN" ] && [ "$SSO_INSTANCE_ARN" != "None" ]; then
              PS_NAME="ArgusAthenaAccess-${ENVIRONMENT}"
              PS_ARN=$(aws sso-admin list-permission-sets --instance-arn "$SSO_INSTANCE_ARN" --region "${AWS_REGION}" --query 'PermissionSets[*]' --output text | tr '\t' '\n' | while read arn; do
                name=$(aws sso-admin describe-permission-set --instance-arn "$SSO_INSTANCE_ARN" --permission-set-arn "$arn" --region "${AWS_REGION}" --query 'PermissionSet.Name' --output text 2>/dev/null)
                [ "$name" = "$PS_NAME" ] && echo "$arn" && break
              done)
              TF_IMPORT_OPTS="-var=environment=${ENVIRONMENT} -var=image_uri=${IMAGE_URI}"
              if [ -n "$PS_ARN" ]; then
                if ! tf_in_state 'aws_ssoadmin_permission_set.athena_access'; then
                  echo "Importing permission set $PS_ARN..."
                  terraform import $TF_IMPORT_OPTS 'aws_ssoadmin_permission_set.athena_access[0]' "${PS_ARN},${SSO_INSTANCE_ARN}" || true
                fi
                if ! tf_in_state 'aws_ssoadmin_managed_policy_attachment.athena_full'; then
                  echo "Importing Athena managed policy attachment..."
                  terraform import $TF_IMPORT_OPTS 'aws_ssoadmin_managed_policy_attachment.athena_full[0]' "arn:aws:iam::aws:policy/AmazonAthenaFullAccess,${PS_ARN},${SSO_INSTANCE_ARN}" || true
                fi
                if ! tf_in_state 'aws_ssoadmin_managed_policy_attachment.glue_readonly'; then
                  echo "Importing Glue managed policy attachment..."
                  terraform import $TF_IMPORT_OPTS 'aws_ssoadmin_managed_policy_attachment.glue_readonly[0]' "arn:aws:iam::aws:policy/AWSGlueConsoleFullAccess,${PS_ARN},${SSO_INSTANCE_ARN}" || true
                fi
              fi
              if [ -n "$IDENTITY_STORE_ID" ] && [ "$IDENTITY_STORE_ID" != "None" ]; then
                GROUP_ID=$(aws identitystore list-groups --identity-store-id "$IDENTITY_STORE_ID" --region "${AWS_REGION}" --query "Groups[?DisplayName=='ArgusUsers'].GroupId | [0]" --output text 2>/dev/null || true)
                if [ -n "$GROUP_ID" ] && [ "$GROUP_ID" != "None" ]; then
                  if ! tf_in_state 'aws_identitystore_group.argus_users'; then
                    echo "Importing identity store group $GROUP_ID..."
                    terraform import $TF_IMPORT_OPTS 'aws_identitystore_group.argus_users[0]' "${IDENTITY_STORE_ID}/${GROUP_ID}" || true
                  fi
                  if [ -n "$PS_ARN" ] && ! tf_in_state 'aws_ssoadmin_account_assignment.argus_users'; then
                    echo "Importing account assignment..."
                    terraform import $TF_IMPORT_OPTS 'aws_ssoadmin_account_assignment.argus_users[0]' "${GROUP_ID},GROUP,${AWS_ACCOUNT_ID},AWS_ACCOUNT,${PS_ARN},${SSO_INSTANCE_ARN}" || true
                  fi
                fi
              fi
            fi
          fi
          terraform apply \
            -var="environment=${ENVIRONMENT}" \
            -var="image_uri=${IMAGE_URI}" \
            -refresh=false \
            -auto-approve
          S3_BUCKET=$(terraform output -raw s3_bucket_name)
          CF_ID=$(terraform output -raw cloudfront_distribution_id)
          echo "S3_BUCKET=${S3_BUCKET}" >> $GITHUB_ENV
          echo "CF_ID=${CF_ID}" >> $GITHUB_ENV
          echo "## Subdomain NS Records" >> $GITHUB_STEP_SUMMARY
          echo "Add these NS records for \`argus.samwylock.com\` in your parent hosted zone:" >> $GITHUB_STEP_SUMMARY
          terraform output -json hosted_zone_name_servers | jq -r '.[]' | while read ns; do echo "- \`$ns\`"; done >> $GITHUB_STEP_SUMMARY || true
      - name: Force Lambda to pull latest ECR image
        if: ${{ !inputs.skip_builds }}
        env:
          IMAGE_URI: ${{ needs.build-and-push-docker.outputs.image_uri }}
          ENVIRONMENT: ${{ inputs.environment || 'prod' }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          # Fallback to :latest if the build-and-push job didn't publish an output
          if [ -z "${IMAGE_URI}" ]; then
            IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/argus-for-athena-${ENVIRONMENT}:latest"
          fi
          aws lambda update-function-code \
            --function-name "argus-for-athena-${ENVIRONMENT}" \
            --image-uri "${IMAGE_URI}" \
            --publish > /dev/null
          aws lambda wait function-updated \
            --function-name "argus-for-athena-${ENVIRONMENT}"
      - name: Sync frontend to S3
        if: ${{ !inputs.skip_builds }}
        run: |
          aws s3 sync frontend/dist/ "s3://${S3_BUCKET}/" \
            --delete \
            --cache-control "max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html "s3://${S3_BUCKET}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"
          aws cloudfront create-invalidation --distribution-id "${CF_ID}" --paths "/*"
