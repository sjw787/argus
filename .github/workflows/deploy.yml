name: Deploy AthenaBeaver

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'prod'
        type: choice
        options: [prod, dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e .
      - name: Run tests
        run: PYTHONPATH=src python -m pytest tests/ -q

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        run: cd frontend && npm ci && npm run build -- --outDir dist
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  build-and-push-docker:
    needs: [lint-and-test]
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.push.outputs.image_uri }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push
        id: push
        env:
          IMAGE_TAG: ${{ github.sha }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'prod' }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          ECR_REPO="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/athena-beaver-${ENVIRONMENT}"
          docker build -f deploy/Dockerfile.backend -t "${ECR_REPO}:${IMAGE_TAG}" .
          docker push "${ECR_REPO}:${IMAGE_TAG}"
          echo "image_uri=${ECR_REPO}:${IMAGE_TAG}" >> $GITHUB_OUTPUT

  terraform-and-deploy:
    needs: [build-and-push-docker, build-frontend]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7'
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
      - name: Terraform apply
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'prod' }}
          IMAGE_URI: ${{ needs.build-and-push-docker.outputs.image_uri }}
          TF_VAR_hosted_zone_id: ${{ secrets.HOSTED_ZONE_ID }}
          TF_VAR_output_location: ${{ secrets.ATHENA_OUTPUT_LOCATION }}
        run: |
          cd infra
          terraform init
          terraform apply \
            -var="environment=${ENVIRONMENT}" \
            -var="image_uri=${IMAGE_URI}" \
            -auto-approve
          S3_BUCKET=$(terraform output -raw s3_bucket_name)
          CF_ID=$(terraform output -raw cloudfront_distribution_id)
          echo "S3_BUCKET=${S3_BUCKET}" >> $GITHUB_ENV
          echo "CF_ID=${CF_ID}" >> $GITHUB_ENV
      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/dist/ "s3://${S3_BUCKET}/" \
            --delete \
            --cache-control "max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html "s3://${S3_BUCKET}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"
          aws cloudfront create-invalidation --distribution-id "${CF_ID}" --paths "/*"
